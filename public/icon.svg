<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" fill="none">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #18181B; }
      .clock-ring { stroke: #A1A1AA; }
      .hand { stroke: #FAFAFA; }
      .center-dot { fill: #A78BFA; }
      .asterisk { fill: #A78BFA; }
      .tick { stroke: #71717A; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FAFAFA; }
      .clock-ring { stroke: #52525B; }
      .hand { stroke: #18181B; }
      .center-dot { fill: #7C3AED; }
      .asterisk { fill: #7C3AED; }
      .tick { stroke: #A1A1AA; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37"/>
  <!-- Clock circle -->
  <circle cx="90" cy="96" r="52" class="clock-ring" stroke-width="5" fill="none"/>
  <!-- Hour ticks -->
  <line x1="90" y1="49" x2="90" y2="56" class="tick" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="136" x2="90" y2="143" class="tick" stroke-width="3" stroke-linecap="round"/>
  <line x1="43" y1="96" x2="50" y2="96" class="tick" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="96" x2="137" y2="96" class="tick" stroke-width="3" stroke-linecap="round"/>
  <!-- Hour hand (pointing to ~10) -->
  <line x1="90" y1="96" x2="72" y2="68" class="hand" stroke-width="6" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~2) -->
  <line x1="90" y1="96" x2="118" y2="76" class="hand" stroke-width="4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="90" cy="96" r="5" class="center-dot"/>
  <!-- Cron asterisks -->
  <text x="22" y="42" font-family="monospace" font-size="30" font-weight="bold" class="asterisk">*</text>
  <text x="138" y="42" font-family="monospace" font-size="30" font-weight="bold" class="asterisk">*</text>
</svg>
